<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FYF Eventos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1d2671);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 35px 25px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        h1 {
            color: #ffffff;
            font-size: 2.3rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .subtitle {
            color: #00ffcc;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .requirements {
            margin-bottom: 35px;
            text-align: left;
            background: rgba(0, 0, 0, 0.25);
            padding: 20px;
            border-radius: 12px;
        }

        .req-item {
            display: flex;
            align-items: center;
            color: #ffffff;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        .req-item:last-child {
            margin-bottom: 0;
        }

        .req-item i {
            color: #00ffcc;
            margin-right: 15px;
            font-size: 1.2rem;
            width: 20px;
            text-align: center;
        }

        .cta-text {
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .btn-whatsapp {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #25D366;
            color: #ffffff;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            width: 100%;
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.3);
            transition: transform 0.2s, background 0.2s;
        }

        .btn-whatsapp i {
            font-size: 1.5rem;
            margin-right: 10px;
        }

        .btn-whatsapp:hover {
            background: #20ba5a;
            transform: translateY(-2px);
        }

        .audio-player {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .play-btn {
            background: #00ffcc;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #000000;
        }

        .track-info {
            color: #ffffff;
            font-size: 0.85rem;
        }

        @media (max-width: 480px) {
            .audio-player {
                left: 50%;
                transform: translateX(-50%);
                right: auto;
                bottom: 15px;
            }
        }
    </style>
</head>
<body>

    <audio id="audioTrack" loop preload="auto">
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <div class="card">
        <h1>FYF Eventos</h1>
        <div class="subtitle">Bolsa de Trabajo</div>
        
        <div class="requirements">
            <div class="req-item">
                <i class="fas fa-search-plus"></i>
                <span>¿Buscas trabajo?</span>
            </div>
            <div class="req-item">
                <i class="fas fa-map-marker-alt"></i>
                <span>¿Sos de La Rioja?</span>
            </div>
            <div class="req-item">
                <i class="fas fa-user-clock"></i>
                <span>¿Tenés entre 18 y 33 años?</span>
            </div>
        </div>

        <p class="cta-text">¡Envianos tu CV por WhatsApp!</p>

        <a href="https://wa.me/5493804677168?text=Hola%20FYF%20Eventos,%20quiero%20enviar%20mi%20CV%20para%20la%20búsqueda%20laboral." class="btn-whatsapp" target="_blank">
            <i class="fab fa-whatsapp"></i> Enviar CV ahora
        </a>
    </div>

    <div class="audio-player">
        <button class="play-btn" onclick="controlMusica()">
            <i class="fas fa-play" id="btnIcon"></i>
        </button>
        <span class="track-info">Va por vos pagina</span>
    </div>

    <script>
        const reproductor = document.getElementById('audioTrack');
        const icono = document.getElementById('btnIcon');

        // Intenta tocar música al hacer click en cualquier parte por si Chrome lo permite
        document.body.addEventListener('click', () => {
            if (reproductor.paused && !reproductor.classList.contains('pausa-manual')) {
                reproductor.play().then(() => {
                    icono.className = "fas fa-pause";
                }).catch(e => console.log("Click requerido en el botón Play"));
            }
        }, { once: true });

        function controlMusica() {
            if (reproductor.paused) {
                reproductor.play();
                icono.className = "fas fa-pause";
            } else {
                reproductor.pause();
                icono.className = "fas fa-play";
                reproductor.classList.add('pausa-manual');
            }
        }
    </script>

</body>
</html>
