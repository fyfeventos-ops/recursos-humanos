<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FYF Eventos - Bolsa de Trabajo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Reset de estilos básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Fondo animado dinámico */
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1d2671);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Contenedor Principal (Efecto Cristal/Glassmorphism) */
        .card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: fadeIn 1s ease-out;
            z-index: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Título Principal */
        h1 {
            color: #ffffff;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .subtitle {
            color: #00ffcc;
            font-size: 1.1rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 35px;
            letter-spacing: 1px;
        }

        /* Sección de Preguntas / Requisitos */
        .requirements {
            margin-bottom: 40px;
            text-align: left;
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 16px;
        }

        .req-item {
            display: flex;
            align-items: center;
            color: #e0e0e0;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        .req-item:last-child {
            margin-bottom: 0;
        }

        .req-item i {
            color: #00ffcc;
            margin-right: 15px;
            font-size: 1.3rem;
        }

        /* Texto de llamado a la acción */
        .cta-text {
            color: #ffffff;
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 25px;
        }

        /* Botón de WhatsApp Premium */
        .btn-whatsapp {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #25D366;
            color: white;
            text-decoration: none;
            padding: 16px 32px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 700;
            width: 100%;
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.4);
            transition: all 0.3s ease;
        }

        .btn-whatsapp i {
            font-size: 1.6rem;
            margin-right: 12px;
        }

        .btn-whatsapp:hover {
            background: #20ba5a;
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(37, 211, 102, 0.6);
        }

        /* Reproductor de Música Flotante y Estético */
        .audio-player {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 18px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            z-index: 10;
            transition: all 0.3s ease;
        }

        .audio-player:hover {
            background: rgba(0, 0, 0, 0.8);
            transform: scale(1.03);
        }

        .play-btn {
            background: #00ffcc;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #111;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .play-btn:hover {
            background: #00d4aa;
        }

        .track-info {
            color: #fff;
            font-size: 0.85rem;
            font-weight: 500;
            user-select: none;
        }

        /* Animación de barritas de sonido cuando suena */
        .sound-wave {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 14px;
        }

        .sound-wave span {
            width: 3px;
            background: #00ffcc;
            border-radius: 2px;
            animation: bounce 1s ease infinite alternate;
            animation-play-state: paused;
        }

        .sound-wave.playing span {
            animation-play-state: running;
        }

        .sound-wave span:nth-child(2) { animation-delay: 0.2s; height: 60%; }
        .sound-wave span:nth-child(3) { animation-delay: 0.4s; height: 100%; }
        .sound-wave span:nth-child(4) { animation-delay: 0.1s; height: 40%; }

        @keyframes bounce {
            0% { height: 20%; }
            100% { height: 100%; }
        }

        /* Adaptabilidad para Pantallas Pequeñas */
        @media (max-width: 480px) {
            h1 { font-size: 2rem; }
            .card { padding: 30px 20px; }
            .req-item { font-size: 1rem; }
            .cta-text { font-size: 1.1rem; }
            .audio-player { left: 50%; transform: translateX(-50%); right: auto; width: max-content; }
            .audio-player:hover { transform: translateX(-50%) scale(1.03); }
        }
    </style>
</head>
<body>

    <audio id="bg-music" src="musica.mp3" loop></audio>

    <div class="card">
        <h1>FYF Eventos</h1>
        <div class="subtitle">Bolsa de Trabajo</div>
        
        <div class="requirements">
            <div class="req-item">
                <i class="fas fa-search-plus"></i>
                <span>¿Buscas trabajo?</span>
            </div>
            <div class="req-item">
                <i class="fas fa-map-marker-alt"></i>
                <span>¿Sos de La Rioja?</span>
            </div>
            <div class="req-item">
                <i class="fas fa-user-clock"></i>
                <span>¿Tenés entre 18 y 33 años?</span>
            </div>
        </div>

        <p class="cta-text">¡Envianos tu CV por WhatsApp!</p>

        <a href="https://wa.me/5493804677168?text=Hola%20FYF%20Eventos,%20quiero%20enviar%20mi%20CV%20para%20la%20búsqueda%20laboral." class="btn-whatsapp" target="_blank">
            <i class="fab fa-whatsapp"></i> Enviar CV ahora
        </a>
    </div>

    <div class="audio-player">
        <button class="play-btn" id="play-button" onclick="toggleMusic()">
            <i class="fas fa-play" id="play-icon"></i>
        </button>
        <span class="track-info">Va por vos pagina</span>
        <div class="sound-wave" id="wave">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <script>
        const music = document.getElementById('bg-music');
        const playButton = document.getElementById('play-button');
        const playIcon = document.getElementById('play-icon');
        const wave = document.getElementById('wave');

        // Intenta reproducir automáticamente al primer clic que haga el usuario en la página
        document.body.addEventListener('click', () => {
            if (music.paused && !music.classList.contains('manually-paused')) {
                playMusic();
            }
        }, { once: true });

        function toggleMusic() {
            if (music.paused) {
                playMusic();
            } else {
                pauseMusic();
                music.classList.add('manually-paused'); // Evita que se reactive sola
            }
        }

        function playMusic() {
            music.play().then(() => {
                playIcon.className = "fas fa-pause";
                wave.classList.add('playing');
            }).catch(e => console.log("Autoplay bloqueado por el navegador"));
        }

        function pauseMusic() {
            music.pause();
            playIcon.className = "fas fa-play";
            wave.classList.remove('playing');
        }
    </script>

</body>
</html>
